<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>LunaRemote Pro v5.3.1 (Resilient)</title>
    <link rel="stylesheet" href="static/style.css?v=5.3.1">
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
</head>
<body>
    <!-- Splash Screen -->
    <div id="splash">
        <div class="splash-logo">LUNA<span>PRO</span></div>
        <div class="splash-loader"></div>
    </div>

    <!-- Main App UI -->
    <div id="app">
        <header>
            <div class="logo">LUNA<span>PRO</span></div>
            <div class="status-group">
                <div class="status-indicator" id="auth-state">🔓</div>
                <div class="status" id="connection-status">Connecting...</div>
            </div>
        </header>

        <nav class="tabs-nav">
            <button class="tab-link active" data-tab="trackpad-view">Trackpad</button>
            <button class="tab-link" data-tab="apps-view">Launch</button>
            <button class="tab-link" data-tab="ai-view">AI Hub</button>
            <button class="tab-link" data-tab="controls-view">Controls</button>
            <button class="tab-link" data-tab="premium-view">Premium</button>
        </nav>

        <main>
            <!-- Trackpad Tab -->
            <section id="trackpad-view" class="tab-content active">
                <div id="trackpad" class="glass-panel">
                    <div class="trackpad-label">RESILIENT TRACKPAD</div>
                    <div class="trackpad-hint">Instant Response • Socket v4.7</div>
                </div>
                <div class="pro-toolbar">
                    <button class="pro-btn" id="pro-drag">Drag</button>
                    <button class="pro-btn" id="pro-rclick">R-Click</button>
                    <div class="kb-compact">
                        <input type="text" id="kb-input" placeholder="Type..." autocomplete="off">
                        <button id="kb-backspace">⌫</button>
                    </div>
                </div>
            </section>

            <!-- AI Hub Tab -->
            <section id="ai-view" class="tab-content">
                <div class="ai-hub-container">
                    <div class="glass-panel ai-card" id="ai-siri">Siri<span>Active Listen</span></div>
                    <div class="glass-panel ai-card" id="ai-chatgpt">ChatGPT<span>GPT-4o</span></div>
                    <div class="glass-panel ai-card" id="ai-gemini">Gemini<span>Ultra 1.5</span></div>
                </div>
            </section>

            <!-- Launchpad Tab -->
            <section id="apps-view" class="tab-content">
                <div class="launchpad-grid">
                    <div class="app-card" data-app="Google Chrome">🌐<span>Chrome</span></div>
                    <div class="app-card" data-app="Spotify">🎵<span>Spotify</span></div>
                    <div class="app-card" data-app="Visual Studio Code">💻<span>VS Code</span></div>
                </div>
            </section>

            <!-- Controls Tab -->
            <section id="controls-view" class="tab-content">
                <div class="controls-grid">
                    <div class="glass-panel control-card">
                        <h3>Volume</h3>
                        <div class="btn-row">
                            <button class="icon-btn" id="vol-down">-</button>
                            <button class="icon-btn" id="vol-mute">M</button>
                            <button class="icon-btn" id="vol-up">+</button>
                        </div>
                    </div>
                    <div class="glass-panel control-card">
                        <h3>System Tools</h3>
                        <button class="action-btn" id="sys-lock">Lock Mac</button>
                    </div>
                </div>
            </section>

            <!-- Premium Tab -->
            <section id="premium-view" class="tab-content">
                <div class="premium-hero">
                    <h2>Ultra Resilient</h2>
                    <p>Experience zero-lag workstation control.</p>
                </div>
            </section>
        </main>
        
        <footer>
            <p>LunaRemote Pro v5.3.1 • Resilient Edition</p>
        </footer>
    </div>

    <script src="static/script.js?v=5.3.1"></script>
</body>
</html>
